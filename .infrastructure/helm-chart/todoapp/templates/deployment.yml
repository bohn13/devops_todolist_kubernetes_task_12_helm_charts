apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Chart.Name}}-deployment
  namespace: {{.Values.todoapp.namespace}}
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{.Values.todoapp.rollingUpdate.maxSurge}}
      maxUnavailable: {{.Values.todoapp.rollingUpdate.maxUnavailable}}
  selector:
    matchLabels:
      app: {{.Chart.Name}}
  template:
    metadata:
      labels:
        app: {{.Chart.Name}}
    spec:
      serviceAccountName: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}
      containers:
      - name: {{.Chart.Name}}
        image: {{ .Values.todoapp.imageRepository }}:{{ .Values.todoapp.tag | default "latest" }}
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: {{.Chart.Name}}-secrets-volume
          mountPath: "/app/secrets"
          readOnly: true
        - name: {{.Chart.Name}}-config-volume
          mountPath: "/app/configs"
          readOnly: true
        resources:
          requests:
            memory: {{.Values.todoapp.resources.requests.memory}}
            cpu: {{.Values.todoapp.resources.requests.cpu}}
          limits:
            memory: {{.Values.todoapp.resources.limits.memory}}
            cpu: {{.Values.todoapp.resources.limits.cpu}}
        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: {{$.Chart.Name}}-config
              key: PYTHONUNBUFFERED
        {{- range $k, $v := .Values.todoapp.secrets }}
        - name: {{ $k }}
          valueFrom:
            secretKeyRef:
              name: {{ $.Chart.Name }}-secret
              key: {{ $k }}
        {{- end }}
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: api/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Chart.Name }}-data
      - name: {{.Chart.Name}}-secrets-volume
        secret:
          secretName: {{.Chart.Name}}-secret
      - name: {{.Chart.Name}}-config-volume
        configMap:
          name: {{.Chart.Name}}-config
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: {{.Values.todoapp.affinity.weight}}
            preference:
              matchExpressions:
              - key: {{.Values.todoapp.affinity.key}}
                operator: In
                values:
                - {{.Values.todoapp.affinity.value}}