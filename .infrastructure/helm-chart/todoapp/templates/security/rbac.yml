kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}
  namespace: {{.Values.todoapp.namespace}}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{.Values.todoapp.namespace}}
  name: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}-role-binding
  namespace: {{.Values.todoapp.namespace}}
subjects:
- kind: ServiceAccount
  name: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}
roleRef:
  kind: Role
  name: {{ .Chart.Name }}-{{ .Values.todoapp.serviceAccountName }}-role
  apiGroup: rbac.authorization.k8s.io