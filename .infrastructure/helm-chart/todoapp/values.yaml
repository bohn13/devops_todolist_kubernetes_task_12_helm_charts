todoapp:
  namespace: todoapp
  imageRepository: ikulyk404/todoapp
  tag: 4.0.1

  secrets:
    SECRET_KEY: '@e2(yx)v&tgh3_s=0yja-i!dpebxsz^dg47x)-k&kq_3zf*9e*'
    DB_NAME: 'app_db'
    DB_USER: 'app_user'
    DB_PASSWORD: '1234'
    DB_HOST: 'mysql-0.mysql.mysql.svc.cluster.local'

  resources:
    requests:
      memory: "256Mi"
      cpu: "150m"
    limits:
      memory: "256Mi"
      cpu: "150m"

  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

  affinity:
    key: app
    weight: 1
    value: todoapp

  hpa:
    minReplicas: 2
    maxReplicas: 5
    averageCpuUtilization: 70
    averageMemoryUtilization: 70

  pv:
    volumeName: "data-volume"
    storageCapacity: '1Gi'

  pvc:
    storageCapacity: '1Gi'

  serviceAccountName: 'secrets-reader'